<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SiteCommand — Sign In</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;500;600;700;800&family=Barlow:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root{--bg:#0d0f14;--bg2:#131620;--bg3:#1a1e2b;--bg4:#222738;--border:rgba(255,255,255,0.07);--border2:rgba(255,255,255,0.13);--accent:#f5a623;--accent2:#e8861a;--blue:#3b82f6;--teal:#14b8a6;--red:#ef4444;--green:#22c55e;--text:#e8eaf0;--text2:#8b90a0;--text3:#555a6a;--font-d:'Barlow Condensed',sans-serif;--font-b:'Barlow',sans-serif;--r:6px;--rl:12px}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:var(--font-b);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:1rem}
.card{background:var(--bg2);border:1px solid var(--border2);border-radius:var(--rl);padding:2rem;width:420px;max-width:100%}
.logo{font-family:var(--font-d);font-size:28px;font-weight:800;letter-spacing:0.04em;color:var(--accent);text-transform:uppercase;text-align:center;margin-bottom:4px}
.logo span{color:var(--text2);font-weight:400}
.tagline{text-align:center;font-size:11px;color:var(--text3);letter-spacing:0.08em;text-transform:uppercase;font-weight:600;margin-bottom:2rem}
.tabs{display:flex;background:var(--bg3);border-radius:var(--r);padding:3px;margin-bottom:1.5rem}
.tab{flex:1;padding:8px;text-align:center;border-radius:4px;cursor:pointer;font-family:var(--font-d);font-size:13px;font-weight:700;letter-spacing:0.05em;text-transform:uppercase;color:var(--text3);transition:all 0.15s}
.tab.active{background:var(--bg2);color:var(--accent);box-shadow:0 1px 6px rgba(0,0,0,0.4)}
.form-group{margin-bottom:1rem}
.form-label{font-size:11px;font-weight:600;letter-spacing:0.08em;text-transform:uppercase;color:var(--text2);display:block;margin-bottom:5px}
.form-input{width:100%;background:var(--bg3);border:1px solid var(--border2);border-radius:var(--r);padding:11px 12px;color:var(--text);font-family:var(--font-b);font-size:15px;outline:none;transition:border-color 0.15s}
.form-input:focus{border-color:var(--accent)}
.form-input::placeholder{color:var(--text3)}
.btn{display:block;width:100%;padding:12px;border-radius:var(--r);border:none;cursor:pointer;font-family:var(--font-d);font-weight:700;font-size:15px;letter-spacing:0.04em;text-transform:uppercase;transition:all 0.15s;margin-top:1.25rem}
.btn-primary{background:var(--accent);color:#000}
.btn-primary:hover{background:var(--accent2)}
.btn-primary:disabled{opacity:0.5;cursor:not-allowed}
.msg{border-radius:var(--r);padding:11px 13px;font-size:13px;margin-top:1rem;display:none;line-height:1.5}
.msg.err{background:rgba(239,68,68,0.1);border:1px solid rgba(239,68,68,0.3);color:#f87171}
.msg.ok{background:rgba(34,197,94,0.1);border:1px solid rgba(34,197,94,0.3);color:#4ade80}
.msg.info{background:rgba(59,130,246,0.1);border:1px solid rgba(59,130,246,0.25);color:#60a5fa}
.forgot{text-align:right;margin-top:-6px;margin-bottom:1rem}
.forgot a{font-size:12px;color:var(--text3);cursor:pointer;text-decoration:none}
.forgot a:hover{color:var(--accent)}
.role-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-top:6px}
.role-opt{background:var(--bg3);border:2px solid var(--border);border-radius:var(--r);padding:10px 8px;text-align:center;cursor:pointer;transition:all 0.15s}
.role-opt:hover{border-color:var(--border2)}
.role-opt.selected{border-color:var(--accent);background:rgba(245,166,35,0.07)}
.role-opt input{display:none}
.role-icon{font-size:20px;margin-bottom:3px}
.role-name{font-family:var(--font-d);font-size:11px;font-weight:700;letter-spacing:0.06em;text-transform:uppercase}
.role-desc{font-size:10px;color:var(--text3);margin-top:1px}
.spinner{display:inline-block;width:14px;height:14px;border:2px solid rgba(0,0,0,0.2);border-top-color:#000;border-radius:50%;animation:spin 0.7s linear infinite;vertical-align:middle;margin-right:6px}
@keyframes spin{to{transform:rotate(360deg)}}
.divider{text-align:center;font-size:11px;color:var(--text3);margin:1rem 0;display:flex;align-items:center;gap:8px}
.divider::before,.divider::after{content:'';flex:1;height:1px;background:var(--border)}
@media(max-width:480px){body{align-items:flex-start;padding-top:2rem}.card{padding:1.5rem 1.25rem}}
</style>
</head>
<body>
<div class="card">
  <div class="logo">Site<span>Command</span></div>
  <div class="tagline">Construction &amp; Telecoms PMO</div>

  <div class="tabs">
    <div class="tab active" id="tab-btn-login" onclick="switchTab('login')">Sign In</div>
    <div class="tab" id="tab-btn-register" onclick="switchTab('register')">Register</div>
  </div>

  <!-- ── SIGN IN ─────────────────────────────────────────────────── -->
  <div id="tab-login">
    <div class="form-group">
      <label class="form-label">Email Address</label>
      <input class="form-input" type="email" id="login-email" placeholder="you@company.com"
             autocomplete="email" onkeydown="if(event.key==='Enter')doLogin()"/>
    </div>
    <div class="form-group">
      <label class="form-label">Password</label>
      <input class="form-input" type="password" id="login-password" placeholder="••••••••"
             autocomplete="current-password" onkeydown="if(event.key==='Enter')doLogin()"/>
    </div>
    <div class="forgot"><a onclick="doForgot()">Forgot password?</a></div>
    <button class="btn btn-primary" id="login-btn" onclick="doLogin()">Sign In</button>
    <div class="msg err" id="login-error"></div>
    <div class="msg ok"  id="login-success"></div>
  </div>

  <!-- ── REGISTER ───────────────────────────────────────────────── -->
  <div id="tab-register" style="display:none">
    <div class="form-group">
      <label class="form-label">Full Name</label>
      <input class="form-input" type="text" id="reg-name" placeholder="e.g. John van der Merwe"
             autocomplete="name"/>
    </div>
    <div class="form-group">
      <label class="form-label">Email Address</label>
      <input class="form-input" type="email" id="reg-email" placeholder="you@company.com"
             autocomplete="email"/>
    </div>
    <div class="form-group">
      <label class="form-label">Password</label>
      <input class="form-input" type="password" id="reg-password" placeholder="Min 8 characters"
             autocomplete="new-password"/>
    </div>
    <div class="form-group">
      <label class="form-label">Your Role</label>
      <div class="role-grid">
        <label class="role-opt selected" id="ro-admin">
          <input type="radio" name="reg-role" value="admin" checked/>
          <div class="role-icon">👑</div>
          <div class="role-name" style="color:var(--accent)">Admin</div>
          <div class="role-desc">Full access</div>
        </label>
        <label class="role-opt" id="ro-pm">
          <input type="radio" name="reg-role" value="pm"/>
          <div class="role-icon">📋</div>
          <div class="role-name" style="color:var(--blue)">PM</div>
          <div class="role-desc">Manage projects</div>
        </label>
        <label class="role-opt" id="ro-foreman">
          <input type="radio" name="reg-role" value="foreman"/>
          <div class="role-icon">👷</div>
          <div class="role-name" style="color:var(--teal)">Foreman</div>
          <div class="role-desc">Field reports</div>
        </label>
        <label class="role-opt" id="ro-viewer">
          <input type="radio" name="reg-role" value="viewer"/>
          <div class="role-icon">👁</div>
          <div class="role-name">Viewer</div>
          <div class="role-desc">Read only</div>
        </label>
      </div>
    </div>
    <button class="btn btn-primary" id="reg-btn" onclick="doRegister()">Create Account</button>
    <div class="msg err"  id="reg-error"></div>
    <div class="msg ok"   id="reg-success"></div>
    <div class="msg info" id="reg-info" style="display:block;margin-top:1rem">
      ℹ After registering, an admin can adjust your role and project access in User Management.
    </div>
  </div>
</div>

<script>
const SB  = 'https://dovdqmzyfgmkxvqdaeyr.supabase.co';
const SK  = 'sb_publishable_qYWGLAhOR63fEdh3qQcgXg_q57DQnUq';
const AH  = {'Content-Type':'application/json','apikey':SK,'Authorization':'Bearer '+SK};

// ── Tab switching ─────────────────────────────────────────────────
function switchTab(t){
  document.getElementById('tab-login').style.display    = t==='login'    ? 'block':'none';
  document.getElementById('tab-register').style.display = t==='register' ? 'block':'none';
  document.getElementById('tab-btn-login').classList.toggle('active',    t==='login');
  document.getElementById('tab-btn-register').classList.toggle('active', t==='register');
}

// ── Role selector UI ─────────────────────────────────────────────
document.querySelectorAll('.role-opt').forEach(opt=>{
  opt.addEventListener('click',()=>{
    document.querySelectorAll('.role-opt').forEach(o=>o.classList.remove('selected'));
    opt.classList.add('selected');
    opt.querySelector('input').checked=true;
  });
});
function getSelectedRole(){
  const checked=document.querySelector('input[name="reg-role"]:checked');
  return checked?checked.value:'viewer';
}

// ── Message helpers ───────────────────────────────────────────────
function showMsg(id,msg,type='err'){
  const el=document.getElementById(id);
  el.textContent=msg; el.className='msg '+type; el.style.display='block';
}
function hideMsg(id){
  const el=document.getElementById(id);
  if(el){el.style.display='none'; el.textContent='';}
}

// ── Store session helper ─────────────────────────────────────────
function storeSession(data){
  localStorage.setItem('sc_session', JSON.stringify({
    access_token  : data.access_token,
    refresh_token : data.refresh_token,
    user          : data.user,
    expires_at    : Date.now() + ((data.expires_in||3600)*1000)
  }));
}

// ── Create/update user_profiles record ──────────────────────────
async function upsertProfile(userId, accessToken, name, role){
  try{
    await fetch(`${SB}/rest/v1/user_profiles`, {
      method  : 'POST',
      headers : {
        'Content-Type'  : 'application/json',
        'apikey'        : SK,
        'Authorization' : 'Bearer ' + accessToken,
        'Prefer'        : 'resolution=merge-duplicates'   // upsert
      },
      body: JSON.stringify({id:userId, full_name:name, role:role, active:true})
    });
  }catch(e){ console.warn('Profile upsert failed:',e); }
}

// ── SIGN IN ──────────────────────────────────────────────────────
async function doLogin(){
  const email    = document.getElementById('login-email').value.trim();
  const password = document.getElementById('login-password').value;
  hideMsg('login-error'); hideMsg('login-success');
  if(!email||!password){ showMsg('login-error','Please enter your email and password.'); return; }

  const btn=document.getElementById('login-btn');
  btn.disabled=true; btn.innerHTML='<span class="spinner"></span>Signing in...';

  try{
    const r = await fetch(`${SB}/auth/v1/token?grant_type=password`,{
      method:'POST', headers:AH,
      body:JSON.stringify({email,password})
    });
    const data = await r.json();

    if(data.error||data.error_description){
      showMsg('login-error', data.error_description||data.error||'Login failed.');
      btn.disabled=false; btn.innerHTML='Sign In'; return;
    }

    // Store session immediately
    storeSession(data);

    // Ensure profile exists in user_profiles
    const name = data.user?.user_metadata?.full_name || email.split('@')[0];
    const role = data.user?.user_metadata?.role || 'viewer';
    await upsertProfile(data.user.id, data.access_token, name, role);

    showMsg('login-success','Signed in! Redirecting...','ok');
    setTimeout(()=>{ window.location.href='index.html'; }, 700);

  }catch(e){
    showMsg('login-error','Connection error. Check your network.');
    btn.disabled=false; btn.innerHTML='Sign In';
  }
}

// ── REGISTER ────────────────────────────────────────────────────
async function doRegister(){
  const name     = document.getElementById('reg-name').value.trim();
  const email    = document.getElementById('reg-email').value.trim();
  const password = document.getElementById('reg-password').value;
  const role     = getSelectedRole();
  hideMsg('reg-error'); hideMsg('reg-success');

  if(!name)             { showMsg('reg-error','Please enter your full name.'); return; }
  if(!email)            { showMsg('reg-error','Please enter your email address.'); return; }
  if(password.length<8) { showMsg('reg-error','Password must be at least 8 characters.'); return; }

  const btn=document.getElementById('reg-btn');
  btn.disabled=true; btn.innerHTML='<span class="spinner"></span>Creating account...';

  try{
    // Step 1: Sign up
    const r = await fetch(`${SB}/auth/v1/signup`,{
      method:'POST', headers:AH,
      body:JSON.stringify({
        email, password,
        data:{ full_name:name, role:role }
      })
    });
    const data = await r.json();

    if(data.error||data.error_description){
      showMsg('reg-error', data.error_description||data.error||'Registration failed.');
      btn.disabled=false; btn.innerHTML='Create Account'; return;
    }

    // Step 2: If email confirmation is OFF, Supabase returns a full session
    //         If it is ON, data.access_token will be null — handle both cases
    if(data.access_token){
      // Email confirmation is OFF — we have a live session, store it and log in
      storeSession(data);
      await upsertProfile(data.user.id, data.access_token, name, role);
      showMsg('reg-success','Account created! Signing you in...','ok');
      setTimeout(()=>{ window.location.href='index.html'; }, 900);

    } else if(data.user && data.user.id){
      // Email confirmation is ON — account created but not confirmed yet
      showMsg('reg-success',
        '✅ Account created! Check your email for a confirmation link, then sign in.',
        'ok');
      // Switch to login tab after a moment so they can sign in after confirming
      setTimeout(()=>{
        switchTab('login');
        document.getElementById('login-email').value=email;
      }, 2500);

    } else {
      showMsg('reg-error','Unexpected response from server. Please try again.');
    }

  }catch(e){
    showMsg('reg-error','Connection error. Check your network.');
  }

  btn.disabled=false; btn.innerHTML='Create Account';
}

// ── FORGOT PASSWORD ──────────────────────────────────────────────
async function doForgot(){
  const email = document.getElementById('login-email').value.trim();
  if(!email){ showMsg('login-error','Enter your email address above first.'); return; }
  try{
    await fetch(`${SB}/auth/v1/recover`,{
      method:'POST', headers:AH,
      body:JSON.stringify({email})
    });
    showMsg('login-success','Password reset email sent — check your inbox.','ok');
  }catch(e){ showMsg('login-error','Could not send reset email.'); }
}

// ── Auto-redirect if already logged in ──────────────────────────
(function checkExistingSession(){
  try{
    const sess = JSON.parse(localStorage.getItem('sc_session')||'null');
    if(sess && sess.access_token && sess.expires_at > Date.now()){
      window.location.href = 'index.html';
    }
  }catch(e){}
})();
</script>
</body>
</html>
