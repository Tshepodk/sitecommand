<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SiteCommand — Sign In</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;500;600;700;800&family=Barlow:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root{--bg:#0d0f14;--bg2:#131620;--bg3:#1a1e2b;--bg4:#222738;--border:rgba(255,255,255,0.07);--border2:rgba(255,255,255,0.12);--accent:#f5a623;--accent2:#e8861a;--blue:#3b82f6;--teal:#14b8a6;--red:#ef4444;--green:#22c55e;--text:#e8eaf0;--text2:#8b90a0;--text3:#555a6a;--font-d:'Barlow Condensed',sans-serif;--font-b:'Barlow',sans-serif;--r:6px;--rl:10px}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:var(--font-b);font-size:14px;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:1rem;position:relative;overflow:hidden}
body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(rgba(255,255,255,0.02) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,0.02) 1px,transparent 1px);background-size:40px 40px;pointer-events:none;z-index:0}
body::after{content:'';position:fixed;top:-20%;left:50%;transform:translateX(-50%);width:600px;height:400px;background:radial-gradient(ellipse,rgba(245,166,35,0.07) 0%,transparent 70%);pointer-events:none;z-index:0}
.login-wrap{position:relative;z-index:1;width:100%;max-width:420px}
.brand{text-align:center;margin-bottom:2rem}
.brand-logo{font-family:var(--font-d);font-size:36px;font-weight:800;letter-spacing:0.06em;text-transform:uppercase;color:var(--accent);line-height:1}
.brand-logo span{color:var(--text2);font-weight:400}
.brand-sub{font-size:12px;color:var(--text3);letter-spacing:0.12em;text-transform:uppercase;margin-top:4px;font-family:var(--font-d);font-weight:600}
.card{background:var(--bg2);border:1px solid var(--border2);border-radius:var(--rl);overflow:hidden}
.tabs{display:grid;grid-template-columns:1fr 1fr;border-bottom:1px solid var(--border)}
.tab{padding:13px;font-family:var(--font-d);font-size:13px;font-weight:700;letter-spacing:0.06em;text-transform:uppercase;text-align:center;cursor:pointer;color:var(--text3);transition:all 0.15s;border:none;background:none;border-bottom:2px solid transparent}
.tab:hover{color:var(--text2)}
.tab.active{color:var(--accent);background:rgba(245,166,35,0.05);border-bottom-color:var(--accent)}
.panel{display:none;padding:1.5rem}
.panel.active{display:block}
.form-group{margin-bottom:1rem}
.form-label{font-size:11px;font-weight:600;letter-spacing:0.08em;text-transform:uppercase;color:var(--text2);display:block;margin-bottom:5px}
.form-input{width:100%;background:var(--bg3);border:1px solid var(--border2);border-radius:var(--r);padding:10px 12px;color:var(--text);font-family:var(--font-b);font-size:14px;outline:none;transition:border-color 0.15s}
.form-input:focus{border-color:var(--accent)}
.form-input::placeholder{color:var(--text3)}
.btn{display:flex;align-items:center;justify-content:center;gap:6px;width:100%;padding:11px;border-radius:var(--r);border:none;cursor:pointer;font-family:var(--font-d);font-weight:700;font-size:14px;letter-spacing:0.06em;text-transform:uppercase;transition:all 0.15s;margin-top:0.25rem}
.btn-primary{background:var(--accent);color:#000}
.btn-primary:hover{background:var(--accent2)}
.btn-primary:disabled{opacity:0.5;cursor:not-allowed}
.viewer-notice{background:rgba(20,184,166,0.07);border:1px solid rgba(20,184,166,0.2);border-radius:var(--r);padding:10px 12px;display:flex;gap:10px;align-items:flex-start;margin-bottom:1rem}
.viewer-notice-icon{font-size:16px;flex-shrink:0;margin-top:1px}
.viewer-notice-text{font-size:12px;color:var(--text2);line-height:1.5}
.viewer-notice-text strong{color:var(--teal);font-family:var(--font-d);letter-spacing:0.04em;font-size:11px;text-transform:uppercase}
.error-msg{background:rgba(239,68,68,0.1);border:1px solid rgba(239,68,68,0.25);border-radius:var(--r);padding:10px 12px;font-size:13px;color:#f87171;margin-bottom:1rem;display:none}
.success-msg{background:rgba(34,197,94,0.1);border:1px solid rgba(34,197,94,0.25);border-radius:var(--r);padding:10px 12px;font-size:13px;color:#4ade80;margin-bottom:1rem;display:none}
.spinner{display:inline-block;width:14px;height:14px;border:2px solid rgba(0,0,0,0.2);border-top-color:#000;border-radius:50%;animation:spin 0.7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.footer-note{text-align:center;margin-top:1.25rem;font-size:11px;color:var(--text3)}
.footer-note a{color:var(--text2);text-decoration:none}
.footer-note a:hover{color:var(--accent)}
.input-wrap{position:relative}
.input-wrap .form-input{padding-right:40px}
.pwd-toggle{position:absolute;right:10px;top:50%;transform:translateY(-50%);background:none;border:none;color:var(--text3);cursor:pointer;font-size:16px;padding:4px;transition:color 0.15s}
.pwd-toggle:hover{color:var(--text2)}
.forgot-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:5px}
.forgot-link{font-size:11px;color:var(--text3);text-decoration:none;transition:color 0.15s;font-family:var(--font-d);font-weight:600;letter-spacing:0.04em;text-transform:uppercase}
.forgot-link:hover{color:var(--accent)}
</style>
</head>
<body>
<div class="login-wrap">
  <div class="brand">
    <div class="brand-logo">Site<span>Command</span></div>
    <div class="brand-sub">Construction &amp; Telecoms PMO</div>
  </div>

  <div class="card">
    <div class="tabs">
      <button class="tab active" id="tab-signin" onclick="switchTab('signin')">Sign In</button>
      <button class="tab" id="tab-register" onclick="switchTab('register')">Register</button>
    </div>

    <!-- SIGN IN -->
    <div class="panel active" id="panel-signin">
      <div class="error-msg" id="signin-error"></div>
      <div class="form-group">
        <label class="form-label">Email Address</label>
        <input class="form-input" type="email" id="signin-email" placeholder="you@company.com" autocomplete="email"/>
      </div>
      <div class="form-group">
        <div class="forgot-row">
          <label class="form-label" style="margin-bottom:0">Password</label>
          <a href="#" class="forgot-link" onclick="showForgotPassword(event)">Forgot password?</a>
        </div>
        <div class="input-wrap">
          <input class="form-input" type="password" id="signin-password" placeholder="Your password" autocomplete="current-password" onkeydown="if(event.key==='Enter')signIn()"/>
          <button class="pwd-toggle" type="button" onclick="togglePwd('signin-password',this)" tabindex="-1">&#128065;</button>
        </div>
      </div>
      <button class="btn btn-primary" id="signin-btn" onclick="signIn()">Sign In</button>
    </div>

    <!-- REGISTER — no role selector, always viewer -->
    <div class="panel" id="panel-register">
      <div class="viewer-notice">
        <div class="viewer-notice-icon">&#128065;</div>
        <div class="viewer-notice-text">
          New accounts start as <strong>Viewer (read-only)</strong>. Your admin will assign the correct role once you're set up.
        </div>
      </div>
      <div class="error-msg" id="reg-error"></div>
      <div class="success-msg" id="reg-success"></div>
      <div class="form-group">
        <label class="form-label">Full Name</label>
        <input class="form-input" type="text" id="reg-name" placeholder="Your full name" autocomplete="name"/>
      </div>
      <div class="form-group">
        <label class="form-label">Email Address</label>
        <input class="form-input" type="email" id="reg-email" placeholder="you@company.com" autocomplete="email"/>
      </div>
      <div class="form-group">
        <label class="form-label">Password</label>
        <div class="input-wrap">
          <input class="form-input" type="password" id="reg-password" placeholder="Minimum 8 characters" autocomplete="new-password"/>
          <button class="pwd-toggle" type="button" onclick="togglePwd('reg-password',this)" tabindex="-1">&#128065;</button>
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">Confirm Password</label>
        <div class="input-wrap">
          <input class="form-input" type="password" id="reg-confirm" placeholder="Repeat password" autocomplete="new-password" onkeydown="if(event.key==='Enter')register()"/>
          <button class="pwd-toggle" type="button" onclick="togglePwd('reg-confirm',this)" tabindex="-1">&#128065;</button>
        </div>
      </div>
      <button class="btn btn-primary" id="reg-btn" onclick="register()">Create Account</button>
    </div>
  </div>

  <div class="footer-note">SiteCommand &copy; 2025 &nbsp;&middot;&nbsp; <a href="index.html">Back to Dashboard</a></div>
</div>

<script>
const SB='https://dovdqmzyfgmkxvqdaeyr.supabase.co';
const SK='sb_publishable_qYWGLAhOR63fEdh3qQcgXg_q57DQnUq';

function switchTab(t){
  ['signin','register'].forEach(id=>{
    document.getElementById('tab-'+id).classList.toggle('active',id===t);
    document.getElementById('panel-'+id).classList.toggle('active',id===t);
  });
  hideMessages();
}

function hideMessages(){
  ['signin-error','reg-error','reg-success'].forEach(id=>{
    const el=document.getElementById(id);if(el)el.style.display='none';
  });
}

function showMsg(id,msg,type='error'){
  const el=document.getElementById(id);if(!el)return;
  el.textContent=msg;
  el.className=type==='ok'?'success-msg':'error-msg';
  el.style.display='block';
}

function togglePwd(inputId,btn){
  const inp=document.getElementById(inputId);
  if(!inp)return;
  inp.type=(inp.type==='password')?'text':'password';
  btn.innerHTML=(inp.type==='text')?'&#128584;':'&#128065;';
}

function setLoading(btnId,loading,label){
  const btn=document.getElementById(btnId);if(!btn)return;
  btn.disabled=loading;
  btn.innerHTML=loading?'<span class="spinner"></span>':label;
}

async function signIn(){
  const email=document.getElementById('signin-email').value.trim();
  const pwd=document.getElementById('signin-password').value;
  hideMessages();
  if(!email||!pwd){showMsg('signin-error','Please enter your email and password.');return;}
  setLoading('signin-btn',true,'Sign In');
  try{
    const r=await fetch(`${SB}/auth/v1/token?grant_type=password`,{
      method:'POST',
      headers:{'Content-Type':'application/json','apikey':SK},
      body:JSON.stringify({email,password:pwd})
    });
    const d=await r.json();
    if(!r.ok)throw new Error(d.error_description||d.msg||'Sign in failed. Check your email and password.');
    const sess={access_token:d.access_token,refresh_token:d.refresh_token,expires_at:Date.now()+(d.expires_in*1000),user:d.user};
    // Fetch role profile
    try{
      const pr=await fetch(`${SB}/rest/v1/user_profiles?id=eq.${d.user.id}&limit=1`,{
        headers:{'Content-Type':'application/json','apikey':SK,'Authorization':'Bearer '+d.access_token}
      });
      if(pr.ok){const pd=await pr.json();if(pd[0])sess.profile=pd[0];}
    }catch(e){}
    localStorage.setItem('sc_session',JSON.stringify(sess));
    window.location.href='index.html';
  }catch(e){
    showMsg('signin-error',e.message||'Sign in failed.');
    setLoading('signin-btn',false,'Sign In');
  }
}

async function register(){
  const name=document.getElementById('reg-name').value.trim();
  const email=document.getElementById('reg-email').value.trim();
  const pwd=document.getElementById('reg-password').value;
  const confirm=document.getElementById('reg-confirm').value;
  hideMessages();
  if(!name){showMsg('reg-error','Please enter your full name.');return;}
  if(!email||!email.includes('@')){showMsg('reg-error','Please enter a valid email address.');return;}
  if(pwd.length<8){showMsg('reg-error','Password must be at least 8 characters.');return;}
  if(pwd!==confirm){showMsg('reg-error','Passwords do not match.');return;}
  setLoading('reg-btn',true,'Create Account');
  try{
    // Always register as viewer — no role selection on this form
    const r=await fetch(`${SB}/auth/v1/signup`,{
      method:'POST',
      headers:{'Content-Type':'application/json','apikey':SK},
      body:JSON.stringify({email,password:pwd,data:{full_name:name,role:'viewer'}})
    });
    const d=await r.json();
    if(!r.ok)throw new Error(d.error_description||d.msg||'Registration failed.');

    // Email confirmation required
    if(d.user&&!d.session){
      showMsg('reg-success','Account created! Check your email to confirm your address, then sign in.','ok');
      document.getElementById('reg-btn').disabled=true;
      return;
    }

    // Auto-confirmed flow
    if(d.session&&d.user){
      // Upsert profile with viewer role
      try{
        await fetch(`${SB}/rest/v1/user_profiles`,{
          method:'POST',
          headers:{
            'Content-Type':'application/json','apikey':SK,
            'Authorization':'Bearer '+d.session.access_token,
            'Prefer':'return=minimal,resolution=ignore-duplicates'
          },
          body:JSON.stringify({id:d.user.id,email:d.user.email,full_name:name,role:'viewer',active:true,created_at:new Date().toISOString()})
        });
      }catch(e){console.warn('Profile insert:',e);}
      const sess={
        access_token:d.session.access_token,refresh_token:d.session.refresh_token,
        expires_at:Date.now()+(d.session.expires_in*1000),user:d.user,
        profile:{id:d.user.id,email:d.user.email,full_name:name,role:'viewer'}
      };
      localStorage.setItem('sc_session',JSON.stringify(sess));
      window.location.href='index.html';
      return;
    }
    showMsg('reg-success','Account created! You can now sign in.','ok');
    setTimeout(()=>switchTab('signin'),1800);
  }catch(e){
    showMsg('reg-error',e.message||'Registration failed. Please try again.');
  }
  setLoading('reg-btn',false,'Create Account');
}

function showForgotPassword(e){
  e.preventDefault();
  const email=document.getElementById('signin-email').value.trim()||prompt('Enter your registered email:');
  if(!email)return;
  fetch(`${SB}/auth/v1/recover`,{method:'POST',headers:{'Content-Type':'application/json','apikey':SK},body:JSON.stringify({email})})
    .then(()=>showMsg('signin-error','Password reset email sent — check your inbox.','ok'))
    .catch(()=>showMsg('signin-error','Could not send reset email.'));
}

// Auto-redirect if already authenticated
(function(){
  try{
    const s=JSON.parse(localStorage.getItem('sc_session')||'null');
    if(s&&s.access_token&&s.expires_at>Date.now())window.location.href='index.html';
  }catch(e){}
})();
</script>
</body>
</html>
